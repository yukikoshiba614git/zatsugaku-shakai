<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九州の雑学 – 農業・畜産編</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8621A;
    --orange-light: #F5895A;
    --orange-pale: #FFF0E8;
    --bg: #FFFBF7;
    --card-bg: #FFFFFF;
    --text: #2D1B00;
    --text-sub: #7A5A3A;
    --border: #F0D5B8;
    --green: #2E7D52;
    --green-light: #E8F5EE;
    --red: #C0392B;
    --red-light: #FDECEA;
    --shadow: 0 4px 24px rgba(232,98,26,0.10);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--orange) 0%, #C94A08 100%);
    color: white; text-align: center; padding: 18px 20px 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(232,98,26,0.3);
  }
  header .region { font-size: 13px; opacity: 0.85; letter-spacing: 2px; margin-bottom: 2px; }
  header h1 { font-size: 20px; font-weight: 900; }
  header .stage-label { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  .progress-wrap { background: white; padding: 12px 20px 10px; border-bottom: 1px solid var(--border); }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange-light), var(--orange)); border-radius: 99px; transition: width 0.4s ease; }

  .dots { display: flex; gap: 6px; justify-content: center; padding: 10px 20px; flex-wrap: wrap; }
  .dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: var(--text-sub); cursor: pointer; transition: all 0.2s; }
  .dot.current { border-color: var(--orange); background: var(--orange); color: white; }
  .dot.done { border-color: var(--orange); background: var(--orange-pale); color: var(--orange); }

  main { padding: 0 16px 40px; max-width: 640px; margin: 0 auto; }

  .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; margin-top: 14px; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .card-badge { background: linear-gradient(90deg, var(--orange), var(--orange-light)); color: white; font-size: 11px; font-weight: 700; padding: 6px 14px; letter-spacing: 1px; }
  .card-title { padding: 16px 18px 12px; font-size: 19px; font-weight: 900; line-height: 1.45; border-bottom: 1px dashed var(--border); }
  .card-img { width: 100%; height: 200px; object-fit: cover; display: block; background: var(--orange-pale); }
  .img-caption { font-size: 10px; color: var(--text-sub); padding: 4px 12px; text-align: right; background: var(--orange-pale); }
  .img-placeholder { width: 100%; height: 200px; background: var(--orange-pale); display: flex; align-items: center; justify-content: center; font-size: 48px; }
  .card-story { padding: 16px 18px; font-size: 15px; line-height: 1.85; color: var(--text); }
  .card-story strong { color: var(--orange); font-weight: 700; }

  .reality-box { margin: 0 18px 14px; background: var(--orange-pale); border-left: 4px solid var(--orange); border-radius: 10px; padding: 12px 14px; }
  .reality-label { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .reality-text { font-size: 14px; line-height: 1.7; color: var(--text); }

  .vocab-box { margin: 0 18px 18px; background: var(--green-light); border-radius: 10px; padding: 12px 14px; }
  .vocab-label { font-size: 11px; font-weight: 700; color: var(--green); letter-spacing: 1px; margin-bottom: 8px; }
  .vocab-item { font-size: 13px; line-height: 1.65; margin-bottom: 4px; }
  .vocab-item strong { color: var(--green); }

  .nav-buttons { display: flex; gap: 10px; padding: 14px 0 0; justify-content: space-between; }
  .btn { flex: 1; padding: 14px 10px; border-radius: 12px; border: none; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-prev { background: white; border: 2px solid var(--border); color: var(--text-sub); }
  .btn-prev:hover { border-color: var(--orange); color: var(--orange); }
  .btn-next { background: linear-gradient(135deg, var(--orange), #C94A08); color: white; box-shadow: 0 4px 14px rgba(232,98,26,0.35); }
  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(232,98,26,0.45); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

  .complete-card { background: linear-gradient(135deg, #FFF7F2, #FFEDE0); border: 2px solid var(--orange-light); border-radius: var(--radius); text-align: center; padding: 30px 24px; margin-top: 14px; animation: fadeUp 0.35s ease; }
  .complete-emoji { font-size: 52px; margin-bottom: 10px; }
  .complete-stars { font-size: 28px; letter-spacing: 4px; margin-bottom: 14px; }
  .complete-title { font-size: 22px; font-weight: 900; color: var(--orange); margin-bottom: 10px; }
  .complete-desc { font-size: 14px; line-height: 1.8; color: var(--text-sub); margin-bottom: 20px; }

  .quiz-header { background: linear-gradient(135deg, #2E3A5F 0%, #1A2540 100%); color: white; text-align: center; padding: 16px 20px 12px; margin-top: 14px; border-radius: var(--radius) var(--radius) 0 0; }
  .quiz-header h2 { font-size: 18px; font-weight: 900; }
  .quiz-header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }

  .quiz-card { background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 20px 18px 24px; animation: fadeUp 0.3s ease; }
  .quiz-q-num { font-size: 11px; color: #2E3A5F; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
  .quiz-q-text { font-size: 16px; font-weight: 700; line-height: 1.6; margin-bottom: 16px; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { padding: 13px 16px; border-radius: 10px; border: 2px solid var(--border); background: white; font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; text-align: left; transition: all 0.2s; }
  .quiz-opt:hover:not(:disabled) { border-color: #2E3A5F; background: #F0F3FA; }
  .quiz-opt.correct { border-color: var(--green) !important; background: var(--green-light) !important; color: var(--green); font-weight: 700; }
  .quiz-opt.wrong { border-color: var(--red) !important; background: var(--red-light) !important; color: var(--red); }
  .quiz-opt:disabled { cursor: default; }

  .quiz-result { margin-top: 14px; padding: 12px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; display: none; }
  .quiz-result.show { display: block; }
  .quiz-result.ok { background: var(--green-light); color: var(--green); border-left: 4px solid var(--green); }
  .quiz-result.ng { background: var(--red-light); color: var(--red); border-left: 4px solid var(--red); }

  .quiz-nav { display: flex; justify-content: flex-end; margin-top: 16px; }
  .btn-quiz-next { padding: 12px 24px; border-radius: 10px; border: none; background: linear-gradient(135deg, #2E3A5F, #1A2540); color: white; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: none; transition: all 0.2s; }
  .btn-quiz-next:hover { transform: translateY(-1px); }

  .score-card { background: linear-gradient(135deg, #2E3A5F, #1A2540); color: white; border-radius: var(--radius); text-align: center; padding: 30px 24px; margin-top: 14px; animation: fadeUp 0.35s ease; }
  .score-num { font-size: 56px; font-weight: 900; color: #FFD700; }
  .score-label { font-size: 16px; opacity: 0.8; margin-top: -4px; margin-bottom: 14px; }
  .score-comment { font-size: 15px; line-height: 1.7; margin-bottom: 22px; }
  .btn-retry { padding: 13px 28px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.4); background: transparent; color: white; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-retry:hover { background: rgba(255,255,255,0.1); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="region">九州地方 · 農業・畜産</div>
  <h1>🌾 九州の食のひみつ</h1>
  <div class="stage-label">ステージ② 雑学10選</div>
</header>

<div class="progress-wrap">
  <div class="progress-meta">
    <span>読んだ雑学</span>
    <span id="progress-text">0 / 10</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="dots" id="dots"></div>

<main>
  <div id="zatsuqaku-section">
    <div class="card" id="card"></div>
    <div class="nav-buttons">
      <button class="btn btn-prev" id="btn-prev" onclick="go(-1)" disabled>← 前へ</button>
      <button class="btn btn-next" id="btn-next" onclick="go(1)">次の雑学へ →</button>
    </div>
  </div>

  <div class="complete-card hidden" id="complete-card">
    <div class="complete-emoji">🎉</div>
    <div class="complete-stars">⭐⭐⭐⭐⭐</div>
    <div class="complete-title">雑学コンプリート！</div>
    <div class="complete-desc">
      九州の農業・畜産について<br>
      10の雑学を全部読んだよ！<br><br>
      二毛作・促成栽培・黒牛黒豚…<br>
      <strong>九州の食卓は、戦略と工夫の結晶だ。</strong>
    </div>
    <button class="btn btn-next" onclick="startQuiz()" style="max-width:280px;margin:0 auto;display:block;">
      クイズに挑戦！ →
    </button>
    <div style="margin-top:12px;">
      <button class="btn btn-prev" onclick="resetZatsuqaku()" style="border:none;background:transparent;font-size:13px;color:var(--text-sub);">もう一度読む 🔄</button>
    </div>
  </div>

  <div id="quiz-section" class="hidden">
    <div class="quiz-header">
      <h2>📝 確認クイズ</h2>
      <p>雑学で学んだことを試してみよう！</p>
    </div>
    <div class="quiz-card" id="quiz-card"></div>
    <div class="score-card hidden" id="score-card">
      <div class="score-num" id="score-num"></div>
      <div class="score-label">/ 10問正解</div>
      <div class="score-comment" id="score-comment"></div>
      <button class="btn-retry" onclick="retryQuiz()">もう一度チャレンジ 🔄</button>
      <br><br>
      <button class="btn-retry" onclick="backToZatsuqaku()" style="font-size:13px;opacity:0.7;">← 雑学に戻る</button>
    </div>
  </div>
</main>

<script>
const ITEMS = [
  {
    num: "01",
    keyword: "福岡県",
    emoji: "🌾",
    title: "同じ田んぼで1年に2回収穫？「二毛作」という農業の知恵",
    story: `筑紫平野を中心に、九州では<strong>二毛作</strong>が古くから行われてきた。二毛作とは、同じ農地で1年間に異なる2種類の作物を育てる農業の方法だ。<br><br>
典型的なパターンは「夏に稲→冬に麦」。稲を収穫した秋に麦の種をまき、翌春に麦を収穫、また夏に稲を植える。同じ土地を1年中フル活用できるため、農業の生産効率が大幅に上がる。<br><br>
これができるのは、九州が<strong>温暖な気候</strong>だから。冬でも気温がそこまで下がらないため、麦が育つ。東北や北海道では冬が厳しすぎて二毛作はできない。暖かさが九州農業の最大の武器だ。`,
    reality: "二毛作が盛んな筑紫平野では、10aあたりの農業収入が一毛作地域の約1.5〜2倍になることもある。福岡県の小麦「ラー麦」はラーメン用に品種改良された九州独自のブランド小麦だ。",
    realityIcon: "🌾",
    vocab: [
      { word: "二毛作", def: "同じ農地で1年間に2種類の異なる作物を順番に栽培すること" },
      { word: "単作（一毛作）", def: "同じ農地で1年間に1種類だけ作物を育てること。寒冷地に多い" }
    ]
  },
  {
    num: "02",
    keyword: "宮崎県",
    emoji: "🥒",
    title: "冬にキュウリが食べられるのは、宮崎のビニールハウスのおかげ",
    story: `スーパーに冬でもキュウリやピーマンが並んでいる。これを可能にしているのが、宮崎県の<strong>促成栽培</strong>だ。<br><br>
促成栽培とは、ビニールハウスやガラス温室を使って、作物の旬よりも早く（または旬でない季節に）育てる栽培方法だ。宮崎では冬でも温暖な気候を活かし、さらにビニールハウスで保温することで、本来は夏野菜であるキュウリ・ピーマン・トマトなどを冬から春にかけて出荷する。<br><br>
旬とズラして出荷できるため、<strong>市場価格が高い時期に売れる</strong>という経営戦略でもある。「旬じゃないから高い」野菜の裏には、こういう農家の知恵がある。`,
    reality: "宮崎県はきゅうりの生産量が全国1〜2位を争う大産地。冬から春にかけて全国に出荷され、「宮崎きゅうり」のブランドは市場でも高く評価されている。ピーマンも全国上位の産地だ。",
    realityIcon: "🥒",
    vocab: [
      { word: "促成栽培", def: "ビニールハウスなどを使い、作物の旬よりも早い時期に収穫できるよう育てる栽培方法" },
      { word: "抑制栽培", def: "促成栽培の逆で、高冷地などを使って旬より遅い時期に収穫する栽培方法" }
    ]
  },
  {
    num: "03",
    keyword: "鹿児島県",
    emoji: "🐄",
    title: "鹿児島の「黒牛・黒豚」はなぜブランドになったのか？",
    story: `鹿児島県は、牛・豚・鶏の生産量が全国トップクラスの「畜産王国」だ。中でも有名なのが<strong>鹿児島黒牛</strong>と<strong>鹿児島黒豚</strong>だ。<br><br>
黒牛は「黒毛和牛」という品種で、霜降りの美しい肉質が特徴。黒豚は「バークシャー種」という品種で、旨みが強くもちっとした食感が人気だ。どちらも長い年月をかけてブランド化に成功し、今や高級食材として全国に流通している。<br><br>
なぜ鹿児島で畜産が盛んかというと、<strong>シラス台地</strong>の存在が大きい。水はけが良すぎて稲作に向かないシラス台地は、牧草を育てる牧場としては最適な土地だったのだ。`,
    reality: "鹿児島県の豚の飼育頭数は全国1位（約130万頭）、肉用牛も全国上位。鹿児島黒牛は2020年に国の地理的表示（GI）保護制度に登録され、偽物が出回らないよう法律で守られている。",
    realityIcon: "🐄",
    vocab: [
      { word: "シラス台地", def: "火山の噴火でできた白っぽい砂や灰（シラス）が積もった台地。水はけが良く稲作に不向き" },
      { word: "地理的表示（GI）", def: "特定の地域の産品であることを証明する国の制度。ブランドを法律で守る仕組み" }
    ]
  },
  {
    num: "04",
    keyword: "宮崎県",
    emoji: "🐔",
    title: "鶏肉の消費量日本一！宮崎が「チキン王国」になった理由",
    story: `宮崎県は、ブロイラー（食肉用鶏）の生産量が全国1位だ。なぜ宮崎で養鶏が発展したのか？<br><br>
理由のひとつは鹿児島と同じく<strong>シラス台地</strong>だ。稲作に不向きな土地が広がる中で、戦後の食糧難の時代に「鶏を育てよう」という動きが広まった。鶏は牛や豚より狭いスペースで育てられ、成長も早い。農家にとって取り組みやすい畜産だった。<br><br>
宮崎の鶏肉といえば<strong>「地鶏の王様」と呼ばれる「宮崎地頭鶏（じとっこ）」</strong>が有名。コリコリした食感と濃い旨みが特徴で、宮崎を訪れる観光客が必ず食べたいと言う郷土料理になっている。`,
    reality: "宮崎県のブロイラー生産量は年間約26万トンで全国1位（鹿児島と争う）。1羽あたりの飼育期間はわずか50〜60日。日本で食べられる鶏肉の約20%以上が九州産だ。",
    realityIcon: "🐔",
    vocab: [
      { word: "ブロイラー", def: "食肉用に品種改良された鶏。成長が早く、約2ヶ月で出荷できる" },
      { word: "地鶏", def: "在来種（昔からいる品種）を使って、一定の広さで放し飼いにした鶏。ブロイラーより旨みが強い" }
    ]
  },
  {
    num: "05",
    keyword: "熊本県",
    emoji: "🌿",
    title: "畳の原料「い草」は、なぜ熊本でしか作られないのか？",
    story: `日本の畳の原料となる<strong>い草</strong>の約9割は、熊本県八代市で生産されている。全国の畳のほぼすべてが熊本産のい草でできているのだ。<br><br>
い草は水田で育てる植物で、夏に収穫する。八代平野は水が豊富で土壌が柔らかく、い草の栽培に最適な環境が揃っている。また、い草は染土（そめつち）と呼ばれる泥に漬けることで、あの独特の緑色と香りが生まれる。<br><br>
しかし近年は<strong>フローリング住宅の増加</strong>で畳の需要が激減。さらに安い中国産い草の輸入も増え、八代のい草農家は急速に減っている。日本の伝統文化を支える産業が、今まさに岐路に立っている。`,
    reality: "熊本県のい草生産量は全国の約95%。1960年代には県内に8,000戸以上あったい草農家が、現在は約400戸以下にまで激減している。畳1枚には約4,000〜5,000本のい草が使われる。",
    realityIcon: "🌿",
    vocab: [
      { word: "い草", def: "畳の表面（畳表）に使われるイグサ科の植物。水田で栽培される" },
      { word: "伝統的工芸品", def: "経済産業大臣が指定する、長い歴史を持つ手工業製品。八代のい草製品もこれに含まれる" }
    ]
  },
  {
    num: "06",
    keyword: "福岡県",
    emoji: "🍵",
    title: "「八女茶」は江戸時代から続く高級ブランド──お茶の産地は山の斜面にある",
    story: `福岡県南部の八女市周辺で作られる<strong>八女茶</strong>は、全国的に知られる高級ブランド茶だ。その歴史は室町時代にさかのぼり、江戸時代には将軍家や大名にも献上された。<br><br>

let current = 0;
let readFlags = new Array(10).fill(false);
let quizCurrent = 0;
let quizScore = 0;
let quizAnswered = false;
const STORAGE_KEY = 'kyushuZatsuqaku_stage2';

function init() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && saved.readFlags) {
      readFlags = saved.readFlags;
      current = readFlags.indexOf(false);
      if (current === -1) current = 9;
    }
  } catch(e) {}
  renderDots();
  renderCard();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ readFlags })); } catch(e) {}
}

function renderDots() {
  const el = document.getElementById('dots');
  el.innerHTML = ITEMS.map((_, i) => {
    let cls = 'dot';
    if (i === current) cls += ' current';
    else if (readFlags[i]) cls += ' done';
    return `<div class="${cls}" onclick="jumpTo(${i})">${i+1}</div>`;
  }).join('');
}

function jumpTo(i) {
  readFlags[current] = true;
  current = i;
  save();
  renderDots();
  renderCard();
}

function updateProgress() {
  const done = readFlags.filter(Boolean).length;
  document.getElementById('progress-text').textContent = `${done} / 10`;
  document.getElementById('progress-fill').style.width = `${done * 10}%`;
}

function renderCard() {
  const d = ITEMS[current];
  updateProgress();
  const isLast = current === 9;

  document.getElementById('card').innerHTML = `
    <div class="card-badge">雑学 ${d.num}</div>
    <div class="card-title">${d.title}</div>
    <div class="img-placeholder" id="img-wrap-${current}">
      <span style="font-size:14px;color:var(--text-sub)">📷 画像を読み込み中...</span>
    </div>
    <div class="img-caption" id="img-caption-${current}"></div>
    <div class="card-story">${d.story}</div>
    <div class="reality-box">
      <div class="reality-label">${d.realityIcon} リアリティ DATA</div>
      <div class="reality-text">${d.reality}</div>
    </div>
    <div class="vocab-box">
      <div class="vocab-label">📖 用語解説</div>
      ${d.vocab.map(v => `<div class="vocab-item">・<strong>【${v.word}】</strong>：${v.def}</div>`).join('')}
    </div>
  `;

  document.getElementById('btn-prev').disabled = current === 0;
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? '✨ 読み終えた！' : '次の雑学へ →';

  loadWikiImage(current, d.keyword, d.emoji);
}

async function loadWikiImage(idx, keyword, fallbackEmoji) {
  try {
    const url = `https://ja.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(keyword)}&prop=pageimages&format=json&pithumbsize=640&origin=*`;
    const res = await fetch(url);
    const data = await res.json();
    const pages = data.query.pages;
    const page = Object.values(pages)[0];
    const wrap = document.getElementById(`img-wrap-${idx}`);
    if (!wrap) return;
    if (page && page.thumbnail) {
      wrap.innerHTML = `<img class="card-img" src="${page.thumbnail.source}" alt="${keyword}">`;
      const cap = document.getElementById(`img-caption-${idx}`);
      if (cap) cap.textContent = `${keyword} © Wikipedia`;
    } else {
      wrap.innerHTML = `<div class="img-placeholder"><span style="font-size:52px">${fallbackEmoji}</span></div>`;
    }
  } catch(e) {
    const wrap = document.getElementById(`img-wrap-${idx}`);
    if (wrap) wrap.innerHTML = `<div class="img-placeholder"><span style="font-size:52px">${fallbackEmoji}</span></div>`;
  }
}

function go(dir) {
  readFlags[current] = true;
  save();
  const next = current + dir;
  if (next < 0) return;
  if (next >= 10) {
    document.getElementById('card').style.display = 'none';
    document.getElementById('btn-prev').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('complete-card').classList.remove('hidden');
    updateProgress();
    renderDots();
    return;
  }
  current = next;
  renderDots();
  renderCard();
}

function resetZatsuqaku() {
  current = 0;
  readFlags = new Array(10).fill(false);
  save();
  document.getElementById('card').style.display = '';
  document.getElementById('btn-prev').style.display = '';
  document.getElementById('btn-next').style.display = '';
  document.getElementById('complete-card').classList.add('hidden');
  renderDots();
  renderCard();
}

function startQuiz() {
  document.getElementById('zatsuqaku-section').classList.add('hidden');
  document.getElementById('complete-card').classList.add('hidden');
  document.getElementById('quiz-section').classList.remove('hidden');
  quizCurrent = 0;
  quizScore = 0;
  renderQuiz();
}

function renderQuiz() {
  const q = QUIZZES[quizCurrent];
  quizAnswered = false;
  document.getElementById('quiz-card').innerHTML = `
    <div class="quiz-q-num">問題 ${quizCurrent + 1} / 10</div>
    <div class="quiz-q-text">${q.q}</div>
    <div class="quiz-options">
      ${q.options.map((opt, i) => `<button class="quiz-opt" onclick="answerQuiz(${i})" id="qopt-${i}">${opt}</button>`).join('')}
    </div>
    <div class="quiz-result" id="quiz-result"></div>
    <div class="quiz-nav">
      <button class="btn-quiz-next" id="quiz-next-btn" onclick="nextQuiz()">
        ${quizCurrent === 9 ? '結果を見る →' : '次の問題へ →'}
      </button>
    </div>
  `;
  document.getElementById('score-card').classList.add('hidden');
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = QUIZZES[quizCurrent];
  const isCorrect = idx === q.ans;
  if (isCorrect) quizScore++;
  document.querySelectorAll('.quiz-opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });
  const res = document.getElementById('quiz-result');
  res.classList.add('show');
  if (isCorrect) {
    res.classList.add('ok');
    res.innerHTML = `✅ 正解！ ${q.exp}`;
  } else {
    res.classList.add('ng');
    res.innerHTML = `❌ 不正解。正解は「${q.options[q.ans]}」です。<br>${q.exp}`;
  }
  document.getElementById('quiz-next-btn').style.display = 'block';
}

function nextQuiz() {
  if (quizCurrent === 9) { showScore(); return; }
  quizCurrent++;
  renderQuiz();
}

function showScore() {
  document.getElementById('quiz-card').innerHTML = '';
  const sc = document.getElementById('score-card');
  sc.classList.remove('hidden');
  document.getElementById('score-num').textContent = quizScore;
  let comment = '';
  if (quizScore === 10) comment = '満点！完璧だ！九州の農業・畜産マスターを名乗っていいぞ！🏆';
  else if (quizScore >= 8) comment = 'すごい！よく覚えている。あと少しで完璧だ！もう一度チャレンジしてみよう。';
  else if (quizScore >= 6) comment = '合格ライン！雑学をもう一回読んで、苦手なところを確認しよう。';
  else if (quizScore >= 4) comment = 'もう少し！雑学に戻って、リアリティDATAと用語解説をしっかり読み直そう。';
  else comment = '雑学をもう一度ゆっくり読もう。読むだけで答えがわかるようになっているよ！';
  document.getElementById('score-comment').textContent = comment;
}

function retryQuiz() {
  quizCurrent = 0;
  quizScore = 0;
  document.getElementById('score-card').classList.add('hidden');
  renderQuiz();
}

function backToZatsuqaku() {
  document.getElementById('quiz-section').classList.add('hidden');
  document.getElementById('zatsuqaku-section').classList.remove('hidden');
  document.getElementById('card').style.display = '';
  document.getElementById('btn-prev').style.display = '';
  document.getElementById('btn-next').style.display = '';
  document.getElementById('complete-card').classList.add('hidden');
  current = 0;
  renderDots();
  renderCard();
}

init();
</script>
</body>
</html>
